name: YouTube Video Botu

on:
  workflow_dispatch: # Manuel başlatma butonu için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları Çek (Checkout)
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yükle (ZORUNLU)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Eğer dosya okunmazsa diye manuel yükleme komutu ekliyorum:
          pip install moviepy edge-tts requests

      - name: Botu Çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Videoyu Kaydet (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: cizgi-film-videosu
          path: ilk_cizgi_filmim.mp4
