name: Tam Otonom Cizgi Film Botu 4K

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Paketleri Kur
        run: |
          pip install moviepy==1.0.3 edge-tts Pillow numpy

      - name: Videoyu Uret
        run: python main.py

      - name: Videoyu Klasore Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-video-sonuc
          path: otonom_shorts.mp4 # main.py'deki OUTPUT_NAME ile tam eşleşmeli!
