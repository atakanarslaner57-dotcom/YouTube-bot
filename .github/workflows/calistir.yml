name: YouTube Video Botu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Gerekli Araçları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 edge-tts Pillow rembg onnxruntime
          # rembg otomatik arka plan temizleme için gereklidir

      - name: Botu Çalıştır
        run: python main.py

      - name: Videoyu Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: Papi-Final-Video
          path: ilk_cizgi_filmim.mp4
