name: YouTube Video Botu

on:
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Sistem ve Python Araçlarını Yükleyin
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          # KRİTİK: Pillow sürümünü sabitleyerek hatayı çözüyoruz
          pip install Pillow==9.5.0
          pip install moviepy==1.0.3 edge-tts requests

      - name: Botu Çalıştır
        run: python main.py

      - name: Videoyu Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: cizgi-film-videosu
          path: ilk_cizgi_filmim.mp4
