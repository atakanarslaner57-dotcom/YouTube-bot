name: Otonom 4K Cizgi Film Botu
on: [workflow_dispatch, push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sistem Kurulumu (FFmpeg 4K Destegi)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Python Paketleri
        run: pip install edge-tts
      - name: 4K Render Al
        run: python main.py
      - name: Videoyu Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-4k-animasyon
          path: otonom_4k.mp4
