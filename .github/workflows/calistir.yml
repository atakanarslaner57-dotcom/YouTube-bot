name: Tam Otonom Cizgi Film Botu 4K
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: FFmpeg ve Sistem Paketlerini Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Gereksinimleri Kur
        run: pip install requests edge-tts moviepy

      - name: Videoyu Uret
        run: python main.py

      - name: Videoyu Klasore Yukle
        uses: actions/upload-artifact@v4
        with:
          name: animasyon-video
          path: otonom_shorts.mp4
