name: Tam Otonom Cizgi Film Botu 4K
on: 
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Sistem Paketlerini Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Python Kur ve Gereksinimleri Yukle
        run: |
          pip install edge-tts requests

      - name: Videoyu Uret
        run: python main.py

      - name: Videoyu Klasore Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-video
          path: otonom_shorts.mp4
