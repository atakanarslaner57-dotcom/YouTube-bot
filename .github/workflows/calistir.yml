name: Tam Otonom Cizgi Film Botu - Senkronize Altyazi

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Python Kur
        with:
          python-version: '3.10'

      - name: Gerekli Paketleri Yukle (System ve Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          pip install moviepy==1.0.3 edge-tts Pillow numpy espeak-ng

      - name: Videoyu Uret
        run: python main.py

      - name: Videoyu Indirilebilir Yap (Cikti: otonom_shorts.mp4)
        uses: actions/upload-artifact@v4
        with:
          name: Otonom-Shorts
          path: otonom_shorts.mp4
