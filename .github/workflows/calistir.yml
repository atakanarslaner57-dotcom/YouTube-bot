name: Otonom 4K Animasyon PRO
on: [workflow_dispatch, push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: FFmpeg 4K Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Python Paketleri
        run: pip install edge-tts requests
      - name: PRO Render Baslat
        run: python main.py
      - name: 4K Videoyu Klasore Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-final-4k
          path: output_4k_final.mp4
