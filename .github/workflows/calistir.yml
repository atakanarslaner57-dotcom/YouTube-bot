name: YouTube Shorts Botu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Gerekli Araçları Yükle
        run: |
          pip install moviepy==1.0.3 edge-tts Pillow

      - name: Botu Çalıştır
        run: python main.py

      - name: Videoyu Sisteme Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: Shorts-Final-Video
          path: otonom_shorts.mp4  # Buradaki isim main.py ile aynı olmalı
