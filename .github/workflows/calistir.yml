name: Tam Otonom Cizgi Film Botu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sistem ve Python Araclarini Yukle
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          pip install moviepy==1.0.3 edge-tts Pillow

      - name: Botu Calistir
        run: python main.py

      - name: Videoyu Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: otonom-video
          path: otonom_shorts.mp4
