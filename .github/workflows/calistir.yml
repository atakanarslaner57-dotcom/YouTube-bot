{/* Reason: Bu yapılandırma, hem yüksek kaliteli ses (edge-tts) hem de görsel işleme (Pillow) paketlerini yükleyerek 4K render için gerekli zemini sağlar. */}
name: Otonom 3D Cizgi Film PRO
on: [workflow_dispatch, push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: FFmpeg ve Sistem Paketleri
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Python Paketleri
        run: pip install edge-tts Pillow requests
      - name: 4K Render Baslat
        run: python main.py
      - name: Videoyu Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-final-3d
          path: output_final.mp4
