name: YouTube Video Bot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # En güncel sürüm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 google-generativeai gTTS

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save Video
        uses: actions/upload-artifact@v4 # Hatayı çözen kritik güncelleme
        with:
          name: Shorts-Output
          path: final_video.mp4
