name: YouTube Video Bot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v3'ten v4'e güncellendi

      - name: Set up Python
        uses: actions/setup-python@v5 # v4'ten v5'e güncellendi
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 google-generativeai gTTS

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload Final Video
        uses: actions/upload-artifact@v4 # İŞTE BURASI! v3 olan yer v4 yapıldı.
        with:
          name: YouTube-Shorts-Output
          path: final_video.mp4
