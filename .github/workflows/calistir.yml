name: YouTube Video Bot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install FFmpeg (Görüntü Motoru)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Libraries (Zorunlu Kurulum)
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 google-generativeai gTTS

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload Video
        uses: actions/upload-artifact@v3
        with:
          name: Shorts-Output
          path: final_video.mp4
