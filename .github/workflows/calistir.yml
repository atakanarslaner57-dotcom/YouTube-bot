name: Tam Otonom Cizgi Film Botu

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Paketleri Yukle
        run: |
          pip install moviepy==1.0.3 edge-tts Pillow numpy

      - name: Videoyu Uret
        run: python main.py

      - name: Videoyu Indirilebilir Yap
        uses: actions/upload-artifact@v4
        with:
          name: Cizgi-Film-Shorts
          path: otonom_shorts.mp4
