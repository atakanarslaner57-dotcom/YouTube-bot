name: Otonom 4K Animasyon PRO
on: 
  workflow_dispatch: # Bu satır "Run Workflow" butonunu getirir
  push:
    branches: [ main ]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sistem Hazirligi
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Paketleri Kur
        run: pip install edge-tts requests
      - name: 4K Render
        run: python main.py
      - name: Videoyu Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-video-4k
          path: final_animation_4k.mp4
