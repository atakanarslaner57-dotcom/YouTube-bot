name: Botu Calistir
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Video Sistem Gereksinimleri
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
      - name: Kutuphaneleri Yukle
        run: |
          pip install -q -U google-generativeai gTTS 
          pip install -q moviepy==1.0.3  # Hata vermeyen sabit sürüm
      - name: Botu Tetikle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Videoyu Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: uretilen-video
          path: final_video.mp4
