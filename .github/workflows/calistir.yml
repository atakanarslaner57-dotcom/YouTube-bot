name: Botu Calistir
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Getir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Daha yeni ve desteklenen bir sürüm

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -q -U google-genai  # Google'in en yeni kütüphanesi

      - name: Botu Tetikle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
