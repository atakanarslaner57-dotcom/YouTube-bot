name: TAM_OTONOM_RENDER
on:
  workflow_dispatch: # BUTONU GETİREN KRİTİK KOMUT
  push:
    branches: [ main, ana ]

jobs:
  render_isleme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: FFmpeg ve Sistem Hazirligi
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: Python Paketleri
        run: pip install edge-tts requests
        
      - name: 4K Render Baslat
        run: python main.py
        
      - name: Videoyu Klasore Yukle
        uses: actions/upload-artifact@v4
        with:
          name: otonom-animasyon-final
          path: final_animation_4k.mp4
